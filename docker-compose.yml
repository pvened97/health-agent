services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthagent
      POSTGRES_PASSWORD: healthagent
      POSTGRES_DB: healthagent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthagent"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
